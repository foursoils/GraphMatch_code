evaluation:
  # 数据根目录
  data_root: "../data"
  
  # 结果子目录，可以是单个字符串或列表（例如 contrast_results, ablation_results）
  result_dirs:
    - contrast_results
    # - ablation_results
    - our_results

  # 需要评估的数据集列表
  datasets:
    - AggreFact-CNN
    - COVID-Fact
    - AggreFact-XSum
    - ExpertQA
    # - Reveal
    - SCIFACT
    - pubhealth
    - summeval
    - minicheck

  # 需要评估的模型/方法列表（对应文件名，不含 .parquet 后缀）
  models:
    # - gpt_5.4_tk
    # - qwen3.5_2b_tk
    # - claude_4.6_tk
    # - deberta-v3-base
    # - deberta-v3-base-512
    # - gemma_31b_tk
    # - glm_5_tk
    - qwen3_4b_instruct

  # 列名配置
  columns:
    label_col: "label"        # 真实标签列
    pred_col: "pred_label"    # 预测标签列（0=不支持, 1=支持, 2=解析失败）

  # 输出配置
  output:
    print_detail: true             # 是否打印每个组合的详细指标（如混淆矩阵等）
    print_confusion_matrix: true   # 是否打印混淆矩阵
    print_per_class_recall: true   # 是否打印各类别 Recall
